name: Build Geode Mod

on:
  push:
    branches:
      - main

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Windows
            os: windows-2022

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Build Mod
        id: build-mod
        uses: geode-sdk/build-geode-mod@main
        with:
          bindings: geode-sdk/bindings
          combine: true
        env:
          # Automatically resolves the exact cloud directory folder structure 
          CMAKE_PREFIX_PATH: "${{ github.workspace }}/cli-profile/geode/sdk"
          CMAKE_MODULE_PATH: "${{ github.workspace }}/cli-profile/geode/sdk/cmake"
