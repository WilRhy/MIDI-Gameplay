name: Build Geode Mod

on:
  push:
    branches:
      - main

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Windows
            os: windows-2022

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - uses: actions/checkout@v4

      # THE ULTIMATE FIX: Force-installs the toolchain directly to the global Windows system environment
      - name: Initialize Global System Environment Variables
        shell: pwsh
        run: |
          irm https://githubusercontent.com | iex
          echo "GEODE_SDK=$env:USERPROFILE/.geode/sdk" >> $env:GITHUB_ENV
          echo "$env:USERPROFILE/.geode" >> $env:GITHUB_PATH

      - name: Build Mod
        uses: geode-sdk/build-geode-mod@main
        with:
          bindings: geode-sdk/bindings
          combine: true
