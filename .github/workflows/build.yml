name: Build Geode Mod

on:
  push:
    branches:
      - main

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Windows
            os: windows-2022

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - uses: actions/checkout@v4

      # Forces the builder to explicitly introduce its profile paths into CMake variables
      - name: Build Mod
        uses: geode-sdk/build-geode-mod@main
        with:
          bindings: geode-sdk/bindings
          combine: true
          configure-args: "-DCMAKE_PREFIX_PATH=D:/a/MIDI-Gameplay/MIDI-Gameplay/cli-profile/geode/sdk -DCMAKE_MODULE_PATH=D:/a/MIDI-Gameplay/MIDI-Gameplay/cli-profile/geode/sdk/cmake"
